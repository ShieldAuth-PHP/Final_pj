<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YARA Malware Detector - 로그</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .log-container {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
        }
        .log-entry {
            font-family: monospace;
            white-space: pre-wrap;
            margin: 5px 0;
        }
        .log-info { color: #0066cc; }
        .log-error { color: #dc3545; }
        .log-debug { color: #28a745; }
    </style>
</head>
<body>
    <h1>스캔 로그</h1>
    <div id="logContent" class="log-container">로그를 불러오는 중...</div>
    <script src="logs.js"></script>
</body>
</html>
